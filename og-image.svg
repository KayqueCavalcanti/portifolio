<?xml version="1.0" encoding="UTF-8"?>
<!--
  og-image.svg — Open Graph / Twitter Card — 1200×630

  ATENÇÃO: LinkedIn e alguns scrapers não renderizam SVG em previews de link.
  Se o preview aparecer quebrado ou em branco, exporte para PNG 1200×630
  e atualize og:image / twitter:image no index.html para "og-image.png":
    · Inkscape : Arquivo → Exportar PNG → 1200 × 630 px
    · CLI      : npx sharp-cli -i og-image.svg -o og-image.png -w 1200 -h 630
    · Browser  : abrir o SVG, inspecionar, copiar canvas via canvas.toBlob()
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Grade de pontos — textura sutil do site -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="0.5" cy="0.5" r="0.9" fill="#191919"/>
    </pattern>
    <!-- Gradiente amber que se dissolve para a direita -->
    <linearGradient id="amberFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffb800" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#ffb800" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffb800" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow suave atrás do bloco de texto central -->
    <radialGradient id="centerGlow" cx="50%" cy="52%" r="45%">
      <stop offset="0%"   stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Fundo ── -->
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.7"/>
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- ── Barra lateral amber (4 px — igual ao site) ── -->
  <rect x="0" y="0" width="4" height="630" fill="#ffb800"/>

  <!-- ── Linhas decorativas amber (topo e rodapé) ── -->
  <rect x="4"  y="0"   width="600" height="1" fill="url(#amberFade)" opacity="0.8"/>
  <rect x="4"  y="629" width="600" height="1" fill="url(#amberFade)" opacity="0.35"/>

  <!-- ── KC.dev — canto superior esquerdo (VT323 / monospace) ── -->
  <text x="52" y="78"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="20" fill="#ffb800" opacity="0.55">❯</text>
  <text x="76" y="78"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="26" font-weight="bold"
        fill="#ffb800" letter-spacing="2">KC.dev</text>

  <!-- ── Nome principal ──
       textLength + lengthAdjust="spacing" distribui o espaço entre letras
       sem distorcer os glifos, preenchendo os 1092 px disponíveis (54 → 1146). -->
  <text x="54" y="312"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="86" font-weight="800"
        fill="#f2f2f2"
        textLength="1092" lengthAdjust="spacing"
        letter-spacing="-1">KAYQUE CAVALCANTI</text>

  <!-- Linha separadora amber curta -->
  <rect x="54" y="330" width="180" height="2" fill="#ffb800"/>

  <!-- ── Subtítulo ── -->
  <text x="54" y="378"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="400"
        fill="#ffb800" letter-spacing="0.3">Desenvolvedor Backend Júnior</text>

  <!-- ── Rodapé: stack técnico (esquerda) + URL (direita) ── -->
  <text x="54" y="572"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="15" fill="#303030" letter-spacing="3">
    Python  ·  C  ·  Flask / FastAPI  ·  SQLite  ·  Git  ·  Redes
  </text>
  <text x="1146" y="572"
        font-family="'Courier New', 'Lucida Console', monospace"
        font-size="14" fill="#2a2a2a" text-anchor="end">
    kayquecavalcanti.github.io/portifolio
  </text>
</svg>
